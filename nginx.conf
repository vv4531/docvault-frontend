server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Public DNS resolver for re-resolving the BFF FQDN on each request.
    resolver 8.8.8.8 valid=30s ipv6=off;

    # Proxy /api to BFF
    location /api {
        set $bff_upstream https://docvault-bff.niceisland-3b1d4e0d.eastus.azurecontainerapps.io;
        proxy_pass $bff_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host docvault-bff.niceisland-3b1d4e0d.eastus.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;

        # Allow up to 5 min for large file uploads (blob upload is synchronous)
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
